name: ci

on:
  push:
    branches:
      - master
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'svelte.config.js'
      - 'tsconfig.json'
      - 'vite.config.ts'
      - '.github/workflows/ci.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'svelte.config.js'
      - 'tsconfig.json'
      - 'vite.config.ts'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Svelte check
        run: npm run check

      - name: Run unit tests
        run: npm test

      - name: Build frontend
        run: npm run build
