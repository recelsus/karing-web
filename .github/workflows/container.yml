name: Container

on:
  push:
    branches:
      - master
    paths:
      - 'src/**'
      - 'docker/nginx.conf'
      - 'package.json'
      - 'package-lock.json'
      - 'svelte.config.js'
      - 'tsconfig.json'
      - 'vite.config.ts'
      - '.github/workflows/container.yml'
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  KARING_WEB_BASE_PATH: /web/
  KARING_WEB_API_BASE: /web/api

jobs:
  container:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    if: ${{ github.ref == 'refs/heads/master' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Prepare image context
        run: |
          mkdir -p .container/root .container/conf.d
          cp -R dist/. .container/root/
          cp docker/nginx.conf .container/conf.d/default.conf
          {
            echo 'FROM nginx:1.29-alpine'
            echo 'COPY root/ /usr/share/nginx/html/'
            echo 'COPY conf.d/default.conf /etc/nginx/conf.d/default.conf'
          } > .container/Dockerfile

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .container
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
