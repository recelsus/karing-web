services:
  karing:
    image: ghcr.io/recelsus/karing:latest
    container_name: karing
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      KARING_DB_PATH: "/var/lib/karing/karing.sqlite"
      KARING_UPLOAD_PATH: "/var/lib/karing/uploads"
      KARING_LOG_PATH: "/var/log/karing"
    volumes:
      - ${PROJECT_ROOT}/data:/var/lib/karing
      - ${PROJECT_ROOT}/logs:/var/log/karing

  karing-web:
    image: nginx:1.29-alpine
    container_name: karing-web
    restart: unless-stopped
    depends_on:
      - karing
    expose:
      - "8080"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ${PROJECT_ROOT}/dist:/usr/share/nginx/html:ro
